<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">

    <!-- Salesforce Data Cloud Web SDK -->
    <script src="https://cdn.c360a.salesforce.com/beacon/c360a/6663e05d-c49f-4650-a43e-98b1e49598b1/scripts/c360a.min.js"></script>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
</nav>

<h1>Contact Us</h1>

<form id="contact-form">

    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email"><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" name="message"></textarea><br><br>

    <button type="submit">Send</button>

</form>

<script>
window.addEventListener("load", function() {

    // Page view
    setTimeout(function() {
        if (window.SalesforceInteractions) {
            SalesforceInteractions.sendEvent({
                interaction: {
                    name: "contact_page_view"
                }
            });
            console.log("✅ Contact page view sent");
        }
    }, 1000);

});

// Form submission tracking
document.getElementById("contact-form").addEventListener("submit", function(event) {

    event.preventDefault(); // stop page refresh (important for testing)

    var email = document.getElementById("email").value;
    var name = document.getElementById("name").value;

    if (window.SalesforceInteractions) {

        SalesforceInteractions.sendEvent({
            interaction: {
                name: "form_submit"
            },
            user: {
                identities: {
                    email: email
                },
                attributes: {
                    name: name,
                    email: email
                }
            }
        });

        console.log("✅ Form submitted and user identified");

    } else {
        console.log("❌ SalesforceInteractions not available");
    }

});
</script>

</body>
</html>
