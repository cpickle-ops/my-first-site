<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>

    <script src="https://cdn.c360a.salesforce.com/beacon/c360a/6663e05d-c49f-4650-a43e-98b1e49598b1/scripts/c360a.min.js"></script>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
</nav>

<h1>Contact Us</h1>

<form id="contact-form">

    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email"><br><br>

    <button type="submit">Send</button>
</form>

<script>
// Page view
window.addEventListener("load", function () {
    setTimeout(function () {

        SalesforceInteractions.sendEvent({
            interaction: {
                name: "cart"
            },
            eventType: "cart",
            interactionName: "page_view",
            pageView: 1,
            pageUrl: window.location.href,
            referrerUrl: document.referrer
        });

        console.log("✅ Contact page view sent");

    }, 500);
});

// Form submit
document.getElementById("contact-form").addEventListener("submit", function(event) {

    event.preventDefault();

    var email = document.getElementById("email").value;
    var name = document.getElementById("name").value;

    SalesforceInteractions.sendEvent({
        interaction: {
            name: "cart"
        },
        eventType: "cart",
        interactionName: "form_submit",
        pageView: 0,
        pageUrl: window.location.href,
        referrerUrl: document.referrer,
        email: email,
        name: name,
        user: {
            identities: {
                email: email
            },
            attributes: {
                name: name
            }
        }
    });

    console.log("✅ Form submitted + identity captured");

});
</script>

</body>
</html>
